<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <!-- Transparent Background -->
  <rect width="100%" height="100%" fill="none" />
  <rect x="80" y="30" width="400" height="540" rx="12" fill="#F8FAFC" stroke="#7C3AED" stroke-width="2" />
  <text x="110" y="50.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#7C3AED" text-anchor="start" font-weight="bold">Application Services (FastAPI)</text>
  <rect x="115" y="115" width="340" height="100" rx="8" fill="#E2E8F0" />
  <rect x="110" y="110" width="340" height="100" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="130" y="125.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">LangGraph Agent Engine</text>
  <text x="130" y="155.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Triggers Multi-Agent workflows &amp; RAG search tools.</text>
  <rect x="115" y="265" width="340" height="100" rx="8" fill="#E2E8F0" />
  <rect x="110" y="260" width="340" height="100" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="130" y="275.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">BackgroundTasks Workers</text>
  <text x="130" y="305.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Executes async batch research gap analysis task queue.</text>
  <rect x="115" y="415" width="340" height="100" rx="8" fill="#E2E8F0" />
  <rect x="110" y="410" width="340" height="100" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="130" y="425.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">Business Service Layer</text>
  <text x="130" y="455.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Orchestrates API endpoints &amp; coordinates DB access.</text>
  <rect x="720" y="30" width="400" height="540" rx="12" fill="#F8FAFC" stroke="#059669" stroke-width="2" />
  <text x="750" y="50.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#059669" text-anchor="start" font-weight="bold">Database &amp; Cache (Storage Tier)</text>
  <rect x="755" y="105" width="340" height="90" rx="8" fill="#E2E8F0" />
  <rect x="750" y="100" width="340" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="770" y="112.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">PostgreSQL 17 DB</text>
  <text x="770" y="140.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Stores relational metadata: chat_session,</text>
  <text x="770" y="159.6" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">chat_sources, and research_gap_task.</text>
  <rect x="755" y="220" width="340" height="90" rx="8" fill="#E2E8F0" />
  <rect x="750" y="215" width="340" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="770" y="227.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">pgvector Vector Store</text>
  <text x="770" y="255.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">HNSW 3072 index for bio/cs/astronomy.</text>
  <text x="770" y="274.6" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Dynamic gem_{gem_id}_files isolation.</text>
  <rect x="755" y="335" width="340" height="90" rx="8" fill="#E2E8F0" />
  <rect x="750" y="330" width="340" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="770" y="342.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">PostgresSaver (Checkpointer)</text>
  <text x="770" y="370.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Stores LangGraph chat history checkpoints</text>
  <text x="770" y="389.6" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">and thread_id conversation states.</text>
  <rect x="755" y="450" width="340" height="90" rx="8" fill="#E2E8F0" />
  <rect x="750" y="445" width="340" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="770" y="457.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">Redis In-Memory Cache</text>
  <text x="770" y="485.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Caches Citation Network relationships</text>
  <text x="770" y="504.6" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">and repetitive RAG search queries.</text>
  <line x1="450" y1="160" x2="750" y2="350" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" />
  <polygon points="750,350 738.0100701405141,349.5084901174848 744.4306951147263,339.3706612108341" fill="#4F46E5" />
  <text x="470" y="230.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="16" fill="#4F46E5" text-anchor="start">Checkpoints (thread_id)</text>
  <line x1="450" y1="180" x2="750" y2="235" stroke="#E11D48" stroke-width="2" stroke-linecap="round" />
  <polygon points="750,235 738.6960935946755,239.02761715902383 740.860028020905,227.22433847049925" fill="#E11D48" />
  <text x="490" y="190.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="16" fill="#E11D48" text-anchor="start">Cosine Similarity Search</text>
  <line x1="450" y1="310" x2="750" y2="145" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" />
  <polygon points="750,145 743.7856096652645,155.26554201041256 738.0025846679986,144.7509511062928" fill="#7C3AED" />
  <text x="490" y="310.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="16" fill="#7C3AED" text-anchor="start">Task Progress &amp; Translation</text>
  <line x1="450" y1="460" x2="750" y2="465" stroke="#059669" stroke-width="2" stroke-linecap="round" />
  <polygon points="750,465 739.5091521156221,470.82598581073137 739.70912434363,458.8276521302562" fill="#059669" />
  <text x="485" y="440.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="16" fill="#059669" text-anchor="start">Citation Cache Hits</text>
</svg>