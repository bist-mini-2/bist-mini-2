<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <!-- Transparent Background -->
  <rect width="100%" height="100%" fill="none" />
  <rect x="55" y="45" width="190" height="220" rx="8" fill="#E2E8F0" />
  <rect x="50" y="40" width="190" height="220" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="2" />
  <text x="65" y="55.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="15" fill="#059669" text-anchor="start" font-weight="bold">Step 01</text>
  <text x="65" y="80.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#1E293B" text-anchor="start" font-weight="bold">기밀 PDF 업로드</text>
  <text x="65" y="120.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">사용자가 논문 초안 전송,</text>
  <text x="65" y="138.2" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">메모리 임시 파싱 및</text>
  <text x="65" y="156.4" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">전용 pgvector 테이블 개설</text>
  <line x1="240" y1="150" x2="280" y2="150" stroke="#E11D48" stroke-width="2" stroke-linecap="round" />
  <polygon points="280,150 269.60769515458674,156.0 269.60769515458674,144.0" fill="#E11D48" />
  <rect x="285" y="45" width="190" height="220" rx="8" fill="#E2E8F0" />
  <rect x="280" y="40" width="190" height="220" rx="8" fill="#FFFFFF" stroke="#0284C7" stroke-width="2" />
  <text x="295" y="55.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="15" fill="#0284C7" text-anchor="start" font-weight="bold">Step 02</text>
  <text x="295" y="80.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#1E293B" text-anchor="start" font-weight="bold">3대 에이전트 토론</text>
  <text x="295" y="120.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">방법론 검토/신규성 분석/</text>
  <text x="295" y="138.2" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">학술 에디터 에이전트가</text>
  <text x="295" y="156.4" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">토론을 거쳐 리뷰서 생성</text>
  <line x1="470" y1="150" x2="510" y2="150" stroke="#E11D48" stroke-width="2" stroke-linecap="round" />
  <polygon points="510,150 499.60769515458674,156.0 499.60769515458674,144.0" fill="#E11D48" />
  <rect x="515" y="45" width="190" height="220" rx="8" fill="#E2E8F0" />
  <rect x="510" y="40" width="190" height="220" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="2" />
  <text x="525" y="55.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="15" fill="#059669" text-anchor="start" font-weight="bold">Step 03</text>
  <text x="525" y="80.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#1E293B" text-anchor="start" font-weight="bold">가설 검증 다수결</text>
  <text x="525" y="120.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">RAG DB 및 참고문서 기준</text>
  <text x="525" y="138.2" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">N회 독립 추론을 실행해</text>
  <text x="525" y="156.4" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">가설 참/거짓 다수결 판정</text>
  <line x1="700" y1="150" x2="740" y2="150" stroke="#E11D48" stroke-width="2" stroke-linecap="round" />
  <polygon points="740,150 729.6076951545867,156.0 729.6076951545867,144.0" fill="#E11D48" />
  <rect x="745" y="45" width="190" height="220" rx="8" fill="#E2E8F0" />
  <rect x="740" y="40" width="190" height="220" rx="8" fill="#FFFFFF" stroke="#0284C7" stroke-width="2" />
  <text x="755" y="55.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="15" fill="#0284C7" text-anchor="start" font-weight="bold">Step 04</text>
  <text x="755" y="80.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#1E293B" text-anchor="start" font-weight="bold">심사위원 디펜스</text>
  <text x="755" y="120.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">리뷰서 기반 취약점 지적,</text>
  <text x="755" y="138.2" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">사용자 방어 논리 작성 시</text>
  <text x="755" y="156.4" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">0~100점 실시간 채점 대화</text>
  <line x1="930" y1="150" x2="970" y2="150" stroke="#E11D48" stroke-width="2" stroke-linecap="round" />
  <polygon points="970,150 959.6076951545867,156.0 959.6076951545867,144.0" fill="#E11D48" />
  <rect x="975" y="45" width="190" height="220" rx="8" fill="#E2E8F0" />
  <rect x="970" y="40" width="190" height="220" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="2" />
  <text x="985" y="55.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="15" fill="#059669" text-anchor="start" font-weight="bold">Step 05</text>
  <text x="985" y="80.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#1E293B" text-anchor="start" font-weight="bold">보안 소거 파쇄</text>
  <text x="985" y="120.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">대화 종료 또는 세션 내</text>
  <text x="985" y="138.2" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">30분 무활동 감지 시</text>
  <text x="985" y="156.4" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">임시 파일/벡터 완전 파쇄</text>
</svg>