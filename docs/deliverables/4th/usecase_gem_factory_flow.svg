<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <!-- Transparent Background -->
  <rect width="100%" height="100%" fill="none" />
  <rect x="75" y="45" width="220" height="220" rx="8" fill="#E2E8F0" />
  <rect x="70" y="40" width="220" height="220" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
  <text x="88" y="55.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="15" fill="#7C3AED" text-anchor="start" font-weight="bold">Step 01</text>
  <text x="88" y="80.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#1E293B" text-anchor="start" font-weight="bold">Gem 개설 및 설정</text>
  <text x="88" y="120.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">사용자가 에이전트 이름,</text>
  <text x="88" y="138.2" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">학술 참고 도메인 범위,</text>
  <text x="88" y="156.4" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">맞춤형 페르소나 지침 기입</text>
  <line x1="290" y1="150" x2="350" y2="150" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" />
  <polygon points="350,150 339.60769515458674,156.0 339.60769515458674,144.0" fill="#4F46E5" />
  <rect x="355" y="45" width="220" height="220" rx="8" fill="#E2E8F0" />
  <rect x="350" y="40" width="220" height="220" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="2" />
  <text x="368" y="55.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="15" fill="#059669" text-anchor="start" font-weight="bold">Step 02</text>
  <text x="368" y="80.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#1E293B" text-anchor="start" font-weight="bold">격리 데이터셋 적재</text>
  <text x="368" y="120.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">참고용 개별 연구 파일 주입,</text>
  <text x="368" y="138.2" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">파싱 후 gem_{gem_id}_files</text>
  <text x="368" y="156.4" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">전용 pgvector 공간 격리 생성</text>
  <line x1="570" y1="150" x2="630" y2="150" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" />
  <polygon points="630,150 619.6076951545867,156.0 619.6076951545867,144.0" fill="#4F46E5" />
  <rect x="635" y="45" width="220" height="220" rx="8" fill="#E2E8F0" />
  <rect x="630" y="40" width="220" height="220" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
  <text x="648" y="55.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="15" fill="#7C3AED" text-anchor="start" font-weight="bold">Step 03</text>
  <text x="648" y="80.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#1E293B" text-anchor="start" font-weight="bold">2-트랙 병렬 대화</text>
  <text x="648" y="120.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">공인 학술 DB 툴과</text>
  <text x="648" y="138.2" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">격리 파일 RAG 툴 동시 연동,</text>
  <text x="648" y="156.4" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">중복 제거 컨텍스트 턴 누적</text>
  <line x1="850" y1="150" x2="910" y2="150" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" />
  <polygon points="910,150 899.6076951545867,156.0 899.6076951545867,144.0" fill="#4F46E5" />
  <rect x="915" y="45" width="220" height="220" rx="8" fill="#E2E8F0" />
  <rect x="910" y="40" width="220" height="220" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="2" />
  <text x="928" y="55.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="15" fill="#059669" text-anchor="start" font-weight="bold">Step 04</text>
  <text x="928" y="80.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#1E293B" text-anchor="start" font-weight="bold">비서 삭제 및 파쇄</text>
  <text x="928" y="120.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">Gem 영구 삭제 트리거 시</text>
  <text x="928" y="138.2" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">Cascade 규칙 메타 정보 소거,</text>
  <text x="928" y="156.4" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#516075" text-anchor="start">pgvector 컬렉션 드롭 파쇄</text>
</svg>