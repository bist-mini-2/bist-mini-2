<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <!-- Transparent Background -->
  <rect width="100%" height="100%" fill="none" />
  <rect x="80" y="30" width="440" height="540" rx="12" fill="#F8FAFC" stroke="#0284C7" stroke-width="2" />
  <text x="110" y="50.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#0284C7" text-anchor="start" font-weight="bold">Frontend Tier (Next.js &amp; Bootstrap 5)</text>
  <rect x="115" y="105" width="380" height="100" rx="8" fill="#E2E8F0" />
  <rect x="110" y="100" width="380" height="100" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="130" y="115.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">UI View Components</text>
  <text x="130" y="145.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">React user interface components for Chat Hub,</text>
  <text x="130" y="164.6" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Gap Analyzer and Gem Factory.</text>
  <rect x="115" y="220" width="380" height="100" rx="8" fill="#E2E8F0" />
  <rect x="110" y="215" width="380" height="100" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="130" y="230.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">Global Context (Auth &amp; State)</text>
  <text x="130" y="260.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">React Context API to manage user session state</text>
  <text x="130" y="279.6" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">and dynamic authentication state.</text>
  <rect x="115" y="335" width="380" height="100" rx="8" fill="#E2E8F0" />
  <rect x="110" y="330" width="380" height="100" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="130" y="345.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">Axios HTTP Client</text>
  <text x="130" y="375.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Async REST API clients inside src/apis/ directory</text>
  <text x="130" y="394.6" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">with automated Bearer Token injection.</text>
  <rect x="115" y="450" width="380" height="100" rx="8" fill="#E2E8F0" />
  <rect x="110" y="445" width="380" height="100" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="130" y="460.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">SSE Event Listener</text>
  <text x="130" y="490.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">EventSource listener for backend real-time</text>
  <text x="130" y="509.6" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">background tasks and token streaming.</text>
  <rect x="680" y="30" width="440" height="540" rx="12" fill="#F8FAFC" stroke="#7C3AED" stroke-width="2" />
  <text x="710" y="50.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#7C3AED" text-anchor="start" font-weight="bold">Application Tier (FastAPI &amp; Auth)</text>
  <rect x="715" y="145" width="380" height="120" rx="8" fill="#E2E8F0" />
  <rect x="710" y="140" width="380" height="120" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="730" y="160.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">JWT Security &amp; Auth Guard</text>
  <text x="730" y="195.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Decodes, parses and validates JWT signature.</text>
  <text x="730" y="214.6" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Verifies user credentials and session status.</text>
  <rect x="715" y="325" width="380" height="120" rx="8" fill="#E2E8F0" />
  <rect x="710" y="320" width="380" height="120" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
  <text x="730" y="340.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#1E293B" text-anchor="start" font-weight="bold">APIRouter Gateway</text>
  <text x="730" y="375.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">Dynamic API routing for Chat, Research Gap</text>
  <text x="730" y="394.6" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#516075" text-anchor="start">and Gem Factory business workflows.</text>
  <line x1="490" y1="390" x2="710" y2="200" stroke="#E11D48" stroke-width="3" stroke-linecap="round" />
  <polygon points="710,200 706.0565838113168,211.33355499227105 698.2131453671637,202.25167889904114" fill="#E11D48" />
  <text x="515" y="250.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="16" fill="#E11D48" text-anchor="start">1. Bearer JWT Requests</text>
  <line x1="900" y1="260" x2="900" y2="320" stroke="#16A34A" stroke-width="3" stroke-linecap="round" />
  <polygon points="900,320 894.0,309.60769515458674 906.0,309.60769515458674" fill="#16A34A" />
  <text x="920" y="280.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="16" fill="#16A34A" text-anchor="start">2. Pass Authorized</text>
  <line x1="710" y1="400" x2="490" y2="505" stroke="#4F46E5" stroke-width="3" stroke-linecap="round" />
  <polygon points="490,505 496.7944805445633,495.1088406074136 501.9632355791426,505.9386130608177" fill="#4F46E5" />
  <text x="505" y="465.0" font-family="Apple SD Gothic Neo, Arial, sans-serif" font-size="16" fill="#4F46E5" text-anchor="start">3. Server-Sent Events</text>
</svg>